services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crux-test-app
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - crux-network
    expose:
      - "4000"

  nginx:
    image: nginx:alpine
    container_name: crux-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - crux-network

networks:
  crux-network:
    driver: bridge
